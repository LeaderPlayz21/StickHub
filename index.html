<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StickHub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .game-modes {
      margin-top: 50px;
    }

    .game-modes h2 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    .game-modes ul {
      list-style: none;
      padding: 0;
    }

    .game-modes li {
      font-size: 24px;
      margin: 15px 0;
      background: #1e293b;
      display: inline-block;
      padding: 12px 25px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .game-modes li:hover {
      background: #334155;
      transform: scale(1.05);
    }

    footer {
      margin-top: 60px;
      padding: 15px;
      background: #1e293b;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    StickHub
  </header>

  <div class="game-modes">
    <h2>Game Modes</h2>
    <ul>
      <li>🪓 Mace</li>
      <li>🪖 Nethpot</li>
      <li>💎⚔️ Sword</li>
    </ul>
  </div>

  <footer>
    © 2026 StickHub
  </footer>

</body>
</html>
