<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Tier List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: #e0e7ff;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="10" cy="10" r="1" fill="white" opacity="0.7"/><circle cx="80" cy="20" r="1.2" fill="white" opacity="0.5"/><circle cx="30" cy="70" r="0.8" fill="white" opacity="0.6"/></svg>') repeat;
            pointer-events: none;
            opacity: 0.4;
            z-index: -1;
        }

        .tier-card {
            background: rgba(30, 30, 60, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.25s ease;
        }

        .tier-card:hover {
            transform: translateY(-6px);
            border-color: #818cf8;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.25);
        }

        .filter-tag {
            background: rgba(30, 30, 60, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }

        .filter-tag:hover {
            background: rgba(50, 50, 90, 0.9);
        }

        .filter-tag.active {
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }

        .metrics {
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #4f46e5/30;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #a5b4fc, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="relative">
    <div class="stars"></div>

    <div class="max-w-5xl mx-auto px-4 py-12">
        <!-- HEADER -->
        <header class="text-center mb-12">
            <h1 class="text-6xl md:text-7xl font-bold tracking-wider mb-3">
                ASTRO TIER LIST
            </h1>
            <p class="text-xl text-indigo-300 opacity-90">
                Minecraft Competitive PvP Rankings • Cosmic Edition
            </p>
        </header>

        <!-- FILTERS -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="filters">
            <span data-filter="all" class="filter-tag active cursor-pointer px-6 py-3 rounded-full text-sm font-medium">ALL</span>
            <span data-filter="sword" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">SWORD</span>
            <span data-filter="axe" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">AXE</span>
            <span data-filter="uhc" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">UHC</span>
            <span data-filter="pot" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">POT</span>
            <span data-filter="nethop" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">NETHOP</span>
            <span data-filter="mace" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">MACE</span>
            <span data-filter="bedwars" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">BEDWARS</span>
            <span data-filter="smp" class="filter-tag cursor-pointer px-6 py-3 rounded-full text-sm font-medium">SMP</span>
        </div>

        <!-- TIER LIST TITLE -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-3xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-ranking-star text-indigo-400"></i>
                CURRENT RANKINGS
            </h2>
            <div id="current-mode" class="text-sm font-mono text-indigo-300 bg-black/40 px-5 py-2 rounded-full border border-indigo-500/30">
                MODE: ALL
            </div>
        </div>

        <!-- TIER LIST CONTAINER -->
        <div id="tier-list" class="space-y-4">
            <!-- Cards will be inserted here -->
            <div class="text-center py-16 text-gray-400 text-xl">
                Select a category above to view rankings
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-20 text-center text-sm text-gray-500">
            <p>© 2026 Astro Tier List • Community PvP Rankings • Not affiliated with Mojang</p>
        </footer>
    </div>

    <script>
        // Sample data structure — add your real players here
        // Each player can have multiple modes with their tier/points
        const playersData = [
            // Example format — replace / add your own
            {
                name: "Marlowww",
                modes: {
                    sword: { tier: "Combat Grandmaster", points: 450, metrics: "HT1 | PK | LT1 | HT2" },
                    axe:   { tier: "Elite", points: 220, metrics: "HT3 | LT2" }
                }
            },
            {
                name: "ItzRealMe",
                modes: {
                    sword: { tier: "Combat Master", points: 330, metrics: "HT2 | LT3 | PK" },
                    pot:   { tier: "High Tier", points: 180, metrics: "HT3 | RHT3" }
                }
            },
            {
                name: "wizyfn30",
                modes: {
                    sword: { tier: "HT3", points: 95, metrics: "HT3 | LT4 | PK" }
                }
            },
            // Add many more players here...
            // {
            //     name: "Evbo_",
            //     modes: { sword: { tier: "LT3", points: 120, metrics: "..." } }
            // }
        ];

        function renderPlayers(mode = 'all') {
            const container = document.getElementById('tier-list');
            container.innerHTML = '';

            let filtered = [];

            if (mode === 'all') {
                // Show all players who have at least one mode
                filtered = playersData;
            } else {
                // Only players who have this mode
                filtered = playersData.filter(p => p.modes[mode]);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-400 text-xl">
                        No rankings available for this category yet<br>
                        <span class="text-sm mt-2 block">Add players in the JavaScript data array!</span>
                    </div>`;
                return;
            }

            // Sort by points descending (highest first) in selected mode or overall best
            filtered.sort((a,b) => {
                const pa = mode === 'all' ? Math.max(...Object.values(a.modes || {}).map(m => m?.points || 0)) : a.modes[mode]?.points || 0;
                const pb = mode === 'all' ? Math.max(...Object.values(b.modes || {}).map(m => m?.points || 0)) : b.modes[mode]?.points || 0;
                return pb - pa;
            });

            filtered.forEach((player, index) => {
                const data = mode === 'all' 
                    ? Object.values(player.modes)[0]   // show best/first mode
                    : player.modes[mode];

                if (!data) return;

                const rankColor = index === 0 ? 'text-yellow-400 drop-shadow-[0_0_10px_#facc15]' :
                                 index === 1 ? 'text-gray-300' :
                                 index === 2 ? 'text-amber-400' : 'text-indigo-300';

                const card = document.createElement('div');
                card.className = `tier-card rounded-2xl p-6 flex flex-col md:flex-row items-start md:items-center gap-6`;

                card.innerHTML = `
                    <div class="${rankColor} w-14 text-5xl font-bold text-center md:text-right">${index + 1}</div>
                    
                    <div class="flex-1">
                        <div class="text-2xl font-bold mb-1">${player.name}</div>
                        <div class="text-lg ${data.tier.includes('Grandmaster') || data.tier.includes('Master') ? 'text-emerald-400' : 'text-indigo-400'}">
                            ${data.tier} (${data.points} pts)
                        </div>
                    </div>
                    
                    <div class="metrics text-sm px-6 py-4 rounded-xl w-full md:w-auto md:min-w-[280px] text-center md:text-right">
                        ${data.metrics || 'No metrics available'}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Filter click handler
        document.querySelectorAll('[data-filter]').forEach(tag => {
            tag.addEventListener('click', () => {
                // Update active style
                document.querySelectorAll('[data-filter]').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');

                const mode = tag.getAttribute('data-filter');
                document.getElementById('current-mode').textContent = `MODE: ${mode.toUpperCase()}`;

                renderPlayers(mode);
            });
        });

        // Initial render
        renderPlayers('all');
    </script>
</body>
</html>
